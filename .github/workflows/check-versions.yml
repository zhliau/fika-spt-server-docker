name: Check for Version Updates

# This workflow checks for new SPT and Fika versions and creates a PR if updates are available

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Get current versions
        id: current
        run: |
          # Extract current SPT version from Dockerfile
          CURRENT_SPT=$(grep "^ARG SPT_VERSION=" Dockerfile | cut -d'=' -f2)
          echo "spt=${CURRENT_SPT}" >> $GITHUB_OUTPUT
          echo "Current SPT version: ${CURRENT_SPT}"

          # Extract current Fika version from Dockerfile
          CURRENT_FIKA=$(grep "^ARG FIKA_VERSION=" Dockerfile | cut -d'=' -f2)
          echo "fika=${CURRENT_FIKA}" >> $GITHUB_OUTPUT
          echo "Current Fika version: ${CURRENT_FIKA}"

      - name: Get latest versions
        id: latest
        run: |
          chmod +x ./scripts/get-spt-version.sh

          # Get latest SPT version
          LATEST_SPT=$(./scripts/get-spt-version.sh latest)
          echo "spt=${LATEST_SPT}" >> $GITHUB_OUTPUT
          echo "Latest SPT version: ${LATEST_SPT}"

          # Get latest Fika version
          LATEST_FIKA=$(curl -s https://api.github.com/repos/project-fika/Fika-Server-CSharp/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "fika=${LATEST_FIKA}" >> $GITHUB_OUTPUT
          echo "Latest Fika version: ${LATEST_FIKA}"

      - name: Check for updates
        id: check
        run: |
          NEEDS_UPDATE=false
          UPDATE_MESSAGE=""

          if [ "${{ steps.current.outputs.spt }}" != "${{ steps.latest.outputs.spt }}" ]; then
            echo "SPT update available: ${{ steps.current.outputs.spt }} -> ${{ steps.latest.outputs.spt }}"
            NEEDS_UPDATE=true
            UPDATE_MESSAGE="${UPDATE_MESSAGE}SPT: ${{ steps.current.outputs.spt }} -> ${{ steps.latest.outputs.spt }}\n"
          fi

          if [ "${{ steps.current.outputs.fika }}" != "${{ steps.latest.outputs.fika }}" ]; then
            echo "Fika update available: ${{ steps.current.outputs.fika }} -> ${{ steps.latest.outputs.fika }}"
            NEEDS_UPDATE=true
            UPDATE_MESSAGE="${UPDATE_MESSAGE}Fika: ${{ steps.current.outputs.fika }} -> ${{ steps.latest.outputs.fika }}\n"
          fi

          echo "needs_update=${NEEDS_UPDATE}" >> $GITHUB_OUTPUT
          echo -e "update_message=${UPDATE_MESSAGE}" >> $GITHUB_OUTPUT

      - name: Update versions
        if: steps.check.outputs.needs_update == 'true'
        run: |
          chmod +x ./update-version.sh
          ./update-version.sh

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: |
            Update SPT and Fika versions

            ${{ steps.check.outputs.update_message }}
          branch: update-versions
          delete-branch: true
          title: "Update to SPT ${{ steps.latest.outputs.spt }} / Fika ${{ steps.latest.outputs.fika }}"
          body: |
            ## Version Updates

            This PR updates the project to the latest available versions:

            ${{ steps.check.outputs.update_message }}

            ### Changes
            - Updated `Dockerfile` with new version ARGs
            - Updated `Dockerfile.multiarch` with new version ARGs
            - Updated `entrypoint.sh` with new default versions

            ### Testing
            Please verify:
            - [ ] Multi-arch build succeeds for both amd64 and arm64
            - [ ] Server starts correctly with new versions
            - [ ] Fika mod installs and works correctly

            ### Notes
            This PR was automatically generated by the version check workflow.

            ---
            🤖 Generated by [GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: |
            dependencies
            automated
